<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ohmyfood</title>
  <!--Début de mon code-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>

  <header class="header">
    <div class="logo">
        <img src="assets/images/logo/ohmyfood.png" alt="ohmyfood">
    </div>
  </header>

  <main>

    <div class="adresse">
      <i class="fas fa-map-marker-alt location__icon"></i>
      <span class="texte-adresse">Paris, Belleville</span>
    </div>

    <section class="reserver">
      <h1 class="reserver-titre">Réservez le menu qui vous convient</h1>
      <p class="reserver-sous-titre">Découvrez des restaurants d'exception, sélectionnés par nos soins.</p>
      <a href="" class="btn">Explorer nos restaurants</a>
    </section>

    <section class="fonctionnement">
      <h2 class="titre-fonctionnement">Fonctionnement</h2>
      <div class="etapes">
          <div class="cards-etape">
              <div class="cards-etape__numero">1</div>
              <i class="fas fa-mobile-alt cards-etape__icone"></i>
              <p class="cards-etape__texte">Choisissez un restaurant</p>
          </div>
          <div class="cards-etape">
              <div class="cards-etape__numero">2</div>
              <i class="fas fa-list-ul cards-etape__icone"></i>
              <p class="cards-etape__texte">Composez votre menu</p>
          </div>
          <div class="cards-etape">
              <div class="cards-etape__numero">3</div>
              <i class="fas fa-store cards-etape__icone"></i>
              <p class="cards-etape__texte">Dégustez au restaurant</p>
          </div>
      </div>
    </section>
    


  </main>
  
</body>
</html>
